worker_processes auto;
error_log /var/log/tengine/error.log warn;
pid /var/run/tengine.pid;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       /etc/tengine/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/tengine/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Upstream health check status endpoint
    server {
        listen 8888;
        server_name localhost;

        location /upstream_check {
            check_status json;
            access_log off;
        }

        location /stub_status {
            stub_status;
            access_log off;
        }
    }

    # Proxy host configs loaded from conf.d
    include /etc/tengine/conf.d/*.conf;
}
